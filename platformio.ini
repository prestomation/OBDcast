[env:freematics_one_plus]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = default_16MB.csv

monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson@^6.21.0

; FreematicsPlus is provided via PLATFORMIO_LIB_EXTRA_DIRS env var (see CI workflow).
; For local dev: export PLATFORMIO_LIB_EXTRA_DIRS=/path/to/Freematics/libraries/FreematicsPlus
; Clone: git clone https://github.com/stanleyhuangyc/Freematics.git

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_CACHE_WORKAROUND

[env:native]
platform = native
test_framework = unity
build_flags =
    -DNATIVE_BUILD
    -std=c++11
