[env:freematics_one_plus]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = default_16MB.csv

monitor_speed = 115200

; FreematicsPlus is not on the PlatformIO registry — it lives in a subdirectory of the
; Freematics monorepo. In CI, it is cloned and lib_extra_dirs points to the library root.
; For local dev: clone https://github.com/stanleyhuangyc/Freematics.git and set:
;   lib_extra_dirs = /path/to/Freematics/libraries/FreematicsPlus
lib_extra_dirs =
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson@^6.21.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_CACHE_WORKAROUND

[env:native]
platform = native
test_framework = unity
build_flags =
    -DNATIVE_BUILD
    -std=c++11
